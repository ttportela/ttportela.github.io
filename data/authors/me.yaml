bio: "Tarlis Tortelli Portela is a professor at the Federal Technological University of Paraná (UTFPR), Campus Dois Vizinhos. Former professor at the Federal Institute of Education, Science and Technology of Paraná (IFPR), Campus Palmas, for 13 years. PhD in Computer Science at the Federal University of Santa Catarina (UFSC) in cotutela with University of Pisa (UniPI) and Institute of Information Science and Technologies “Alessandro Faedo” – National Research Council of Italy (ISTI-CNR). Master’s in Electrical Engineering in the Postgraduate Program in Electrical Engineering by the Federal Technological University of Paraná (UTFPR), Campus Pato Branco. Specialist in Software Engineering and Project Management at Faculdade Mater Dei and specialist in Computer Networks at UTFPR. Graduate in Technology in Information Systems (UTFPR). Has experience as a software architect, engineer, developer, and business manager. Also acted as Course Coordinator and Internship Coordinator."
